name = "peerscope-waitlist"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Secrets (set via CF Pages dashboard or `wrangler pages secret put`):
# RESEND_API_KEY          — Resend transactional email API key
# ALERT_EMAIL             — Override alert recipient (default: henrik@soederlund.com.au)
# BETTER_AUTH_SECRET      — HS256 JWT signing secret (min 32 chars, generate with: openssl rand -base64 32)
# BETTER_AUTH_URL         — Public base URL (https://peerscope-waitlist.pages.dev)
# ADMIN_KEY               — Secret for POST /api/portal/agencies bootstrap endpoint
# STRIPE_SECRET_KEY       — Stripe secret key (sk_live_... or sk_test_...)
# STRIPE_WEBHOOK_SECRET   — Stripe webhook signing secret (whsec_...)
# STRIPE_PRICE_ID         — Stripe price ID for AUD$249/mo plan (price_...)

[[d1_databases]]
binding = "DB"
database_name = "peerscope-waitlist"
database_id = "d74e1ce9-0a54-4366-8750-7133130781a9"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "DEBOUNCE"
id = "74584493a8354139b672365bf43b3cb2"

# Client Portal: report blobs + agency logos
# R2 bucket must be created via CF dashboard before deploy:
#   wrangler r2 bucket create peerscope-portal
[[r2_buckets]]
binding = "PORTAL_STORAGE"
bucket_name = "peerscope-portal"

