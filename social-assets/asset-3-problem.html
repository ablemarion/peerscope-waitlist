<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Peerscope — Problem Card 1200×628</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    background: #0D0F1A;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .card {
    position: relative;
    width: 1200px;
    height: 628px;
    background: #0D0F1A;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* Grid bg */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(52, 214, 183, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(52, 214, 183, 0.035) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Accent bar */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #F07C35 0%, #B8622A 60%, transparent 100%);
  }

  /* Large stat number — decorative background */
  .stat-bg {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 480px;
    line-height: 1;
    color: rgba(240,124,53,0.04);
    letter-spacing: -0.06em;
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Left glow */
  .glow {
    position: absolute;
    top: -50px;
    left: -100px;
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(240,124,53,0.1) 0%, transparent 65%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 72px 100px;
    max-width: 820px;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .eyebrow-line {
    width: 40px;
    height: 2px;
    background: #F07C35;
  }

  .eyebrow-text {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #F07C35;
  }

  .stat-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 20px;
    line-height: 1;
  }

  .stat-number {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 148px;
    letter-spacing: -0.05em;
    color: #FAFAF6;
    line-height: 0.9;
  }

  .stat-plus {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 80px;
    color: #F07C35;
    line-height: 1;
    align-self: flex-start;
    margin-top: 12px;
  }

  .stat-unit {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: rgba(250,250,246,0.45);
    align-self: flex-end;
    margin-bottom: 12px;
    margin-left: 8px;
  }

  .stat-description {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: rgba(250,250,246,0.55);
    line-height: 1.4;
    margin-bottom: 48px;
    max-width: 600px;
  }

  .stat-description strong {
    color: rgba(250,250,246,0.85);
    font-weight: 600;
  }

  /* The better way */
  .better-way {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 40px;
  }

  .better-line-1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 42px;
    letter-spacing: -0.03em;
    color: #FAFAF6;
    line-height: 1.1;
  }

  .better-line-2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 42px;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #34D6B7, #1A7A6E);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  /* Footer */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 700px;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wordmark-dot {
    width: 8px;
    height: 8px;
    background: #34D6B7;
    border-radius: 50%;
  }

  .wordmark-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: rgba(250,250,246,0.5);
    letter-spacing: -0.02em;
  }

  .citation {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(250,250,246,0.2);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid-bg"></div>
  <div class="accent-bar"></div>
  <div class="glow"></div>
  <div class="stat-bg">4</div>

  <div class="content">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <span class="eyebrow-text">The reality for most SaaS teams</span>
    </div>

    <div class="stat-row">
      <span class="stat-number">4</span>
      <span class="stat-plus">+</span>
      <span class="stat-unit">hrs/week</span>
    </div>

    <p class="stat-description">
      <strong>SMBs spend 4+ hours every week</strong> manually checking competitor websites, pricing pages, and job boards.
    </p>

    <div class="better-way">
      <span class="better-line-1">There is a better way.</span>
      <span class="better-line-2">Get it delivered instead.</span>
    </div>

    <div class="footer-row">
      <div class="wordmark">
        <div class="wordmark-dot"></div>
        <span class="wordmark-text">peerscope</span>
      </div>
      <span class="citation">Peerscope customer interviews, 2026</span>
    </div>
  </div>
</div>
</body>
</html>
