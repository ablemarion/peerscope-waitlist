<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Peerscope — Founding Member Card 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0D0F1A;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    background: #0D0F1A;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Radial glow background */
  .glow-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle at center, rgba(26,122,110,0.18) 0%, rgba(240,124,53,0.06) 50%, transparent 70%);
    pointer-events: none;
  }

  /* Grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(52, 214, 183, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(52, 214, 183, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Accent bars */
  .accent-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #34D6B7 40%, #F07C35 60%, transparent);
  }
  .accent-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #F07C35 40%, #34D6B7 60%, transparent);
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
  }
  .corner-tl {
    top: 24px;
    left: 24px;
    border-top: 2px solid rgba(52, 214, 183, 0.4);
    border-left: 2px solid rgba(52, 214, 183, 0.4);
  }
  .corner-tr {
    top: 24px;
    right: 24px;
    border-top: 2px solid rgba(52, 214, 183, 0.4);
    border-right: 2px solid rgba(52, 214, 183, 0.4);
  }
  .corner-bl {
    bottom: 24px;
    left: 24px;
    border-bottom: 2px solid rgba(52, 214, 183, 0.4);
    border-left: 2px solid rgba(52, 214, 183, 0.4);
  }
  .corner-br {
    bottom: 24px;
    right: 24px;
    border-bottom: 2px solid rgba(52, 214, 183, 0.4);
    border-right: 2px solid rgba(52, 214, 183, 0.4);
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 120px;
    gap: 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(240,124,53,0.12);
    border: 1px solid rgba(240,124,53,0.3);
    border-radius: 100px;
    padding: 8px 20px;
    margin-bottom: 48px;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    background: #F07C35;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(240,124,53,0.7);
  }

  .badge-text {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #F07C35;
  }

  .price-block {
    margin-bottom: 12px;
  }

  .price-label {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(250,250,246,0.45);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .price-main {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 120px;
    line-height: 1;
    letter-spacing: -0.05em;
    color: #FAFAF6;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0;
  }

  .price-currency {
    font-size: 52px;
    font-weight: 700;
    color: #34D6B7;
    margin-top: 14px;
  }

  .price-period {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: rgba(250,250,246,0.4);
    align-self: flex-end;
    margin-bottom: 12px;
    margin-left: 4px;
  }

  .price-forever {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #34D6B7;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 52px;
  }

  /* Progress bar */
  .spots-block {
    width: 100%;
    max-width: 560px;
    margin-bottom: 48px;
  }

  .spots-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .spots-label {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(250,250,246,0.6);
  }

  .spots-count {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #FAFAF6;
  }

  .spots-count span {
    color: #F07C35;
  }

  .progress-track {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 28%;
    background: linear-gradient(90deg, #34D6B7, #F07C35);
    border-radius: 100px;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translate(50%, -50%);
    width: 14px;
    height: 14px;
    background: #F07C35;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(240,124,53,0.8);
    border: 2px solid #0D0F1A;
  }

  .urgency-line {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: rgba(250,250,246,0.4);
    margin-bottom: 48px;
    line-height: 1.5;
  }

  .urgency-line strong {
    color: rgba(250,250,246,0.8);
    font-weight: 600;
  }

  /* Wordmark footer */
  .footer {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .footer-dot {
    width: 8px;
    height: 8px;
    background: #34D6B7;
    border-radius: 50%;
  }

  .footer-wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: rgba(250,250,246,0.4);
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid-bg"></div>
  <div class="glow-center"></div>
  <div class="accent-top"></div>
  <div class="accent-bottom"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Founding Member Offer</span>
    </div>

    <div class="price-block">
      <div class="price-label">Lock in your rate</div>
      <div class="price-main">
        <span class="price-currency">$</span>
        <span>19</span>
        <span class="price-period">/mo</span>
      </div>
    </div>
    <div class="price-forever">Forever. Never increases.</div>

    <div class="spots-block">
      <div class="spots-header">
        <span class="spots-label">Founding spots claimed</span>
        <span class="spots-count"><span>14</span> of 50</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="urgency-line">
      Only <strong>50 founding members.</strong> After that, it's $49/mo.<br>
      Join now and lock in your rate permanently.
    </div>

    <div class="footer">
      <div class="footer-dot"></div>
      <span class="footer-wordmark">peerscope</span>
    </div>
  </div>
</div>
</body>
</html>
