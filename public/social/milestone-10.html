<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Milestone: 10 Sign-ups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    background: #0F0F0B;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  /* Subtle dot grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #2a2a22 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.5;
  }

  /* Top brand bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #B8622A;
  }

  /* Logo top-left */
  .logo {
    position: absolute;
    top: 40px;
    left: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: #FAFAF6;
    text-transform: uppercase;
  }

  /* Left content */
  .left {
    position: absolute;
    top: 0;
    left: 64px;
    width: 580px;
    height: 628px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 32px;
  }

  .milestone-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: #B8622A;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: #FAFAF6;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }

  .headline em {
    color: #B8622A;
    font-style: normal;
  }

  .subtext {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: #7A7A68;
    line-height: 1.5;
  }

  .subtext strong {
    color: #AAAAAA;
    font-weight: 600;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: #B8622A;
    margin: 28px 0;
  }

  .url {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #4A4A3A;
    letter-spacing: 0.05em;
  }

  /* Right: big number hero */
  .right {
    position: absolute;
    top: 0;
    right: 0;
    width: 520px;
    height: 628px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  /* Amber ring accent */
  .ring {
    position: absolute;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    border: 1.5px solid #B8622A;
    opacity: 0.15;
  }

  .ring-inner {
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 1px solid #B8622A;
    opacity: 0.1;
  }

  .big-number {
    font-family: 'Syne', sans-serif;
    font-size: 220px;
    font-weight: 800;
    color: #B8622A;
    line-height: 1;
    letter-spacing: -0.05em;
    position: relative;
    z-index: 1;
    opacity: 0.9;
  }

  .number-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: #5A5A4A;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="top-bar"></div>

  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="12.5" stroke="#B8622A" stroke-width="2"/>
      <circle cx="14" cy="14" r="5" fill="#B8622A"/>
      <line x1="14" y1="2" x2="14" y2="7" stroke="#B8622A" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="14" y1="21" x2="14" y2="26" stroke="#B8622A" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="2" y1="14" x2="7" y2="14" stroke="#B8622A" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="21" y1="14" x2="26" y2="14" stroke="#B8622A" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Peerscope</span>
  </div>

  <div class="left">
    <div class="milestone-label">Milestone reached</div>
    <div class="headline"><em>10 founders</em> have<br>joined the Peerscope<br>waitlist</div>
    <div class="divider"></div>
    <div class="subtext">
      <strong>40 spots left at founding price</strong><br>
      Closes April&nbsp;15
    </div>
    <div class="divider"></div>
    <div class="url">peerscope.io</div>
  </div>

  <div class="right">
    <div class="ring"></div>
    <div class="ring-inner"></div>
    <div class="big-number">10</div>
    <div class="number-label">sign-ups</div>
  </div>
</body>
</html>
