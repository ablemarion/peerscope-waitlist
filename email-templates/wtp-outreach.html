<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{ subject }}</title>
  <style>
    @media (prefers-color-scheme: dark) {
      body,
      .email-wrapper {
        background-color: #111111 !important;
      }
      .email-body {
        color: #d4d4d4 !important;
      }
      .email-link {
        color: #93c5fd !important;
      }
      .email-divider {
        border-color: #2a2a2a !important;
      }
      .email-footer {
        color: #525252 !important;
      }
      .email-wordmark {
        color: #525252 !important;
      }
    }

    @media only screen and (max-width: 480px) {
      .email-container {
        padding: 24px 20px !important;
      }
    }
  </style>
</head>
<body class="email-wrapper" style="margin: 0; padding: 0; background-color: #fafafa; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="background-color: #fafafa;">
    <tr>
      <td align="center" style="padding: 40px 16px;">

        <table class="email-container" width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="max-width: 600px; width: 100%; padding: 40px 40px 32px 40px;">
          <tr>
            <td class="email-body" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #262626;">

              <!-- Greeting -->
              <p style="margin: 0 0 20px 0;">Hi {{ first_name }},</p>

              <!-- Body paragraphs slot -->
              {{ body_paragraphs }}

              <!-- Signature -->
              <p style="margin: 28px 0 0 0;">{{ signature }}</p>

              <p style="margin: 4px 0 0 0; font-size: 14px; color: #737373;">
                <a class="email-link" href="mailto:hello@peerscope.io" style="color: #525252; text-decoration: none;">hello@peerscope.io</a>
              </p>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 32px 0 20px 0;">
              <hr class="email-divider" style="border: none; border-top: 1px solid #e5e5e5; margin: 0;">
            </td>
          </tr>

          <!-- Footer: wordmark only -->
          <tr>
            <td style="text-align: left;">
              <span class="email-wordmark" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; color: #a3a3a3; letter-spacing: -0.01em;">peerscope</span>
              <span class="email-footer" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; color: #a3a3a3;"> &middot; <a class="email-link" href="https://peerscope.io" style="color: #a3a3a3; text-decoration: none;">peerscope.app</a></span>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
