<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E293B" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="glow" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#B8622A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D0F1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0F1A"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#F07C35"/>

  <!-- Left vertical accent line -->
  <rect x="72" y="60" width="3" height="480" fill="#B8622A" opacity="0.3"/>

  <!-- Logo: scope icon -->
  <g transform="translate(92, 64)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="#F07C35" stroke-width="2.5"/>
    <circle cx="16" cy="16" r="6" fill="#F07C35" opacity="0.9"/>
    <line x1="16" y1="2" x2="16" y2="8" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="16" y2="30" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="16" x2="8" y2="16" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="16" x2="30" y2="16" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="132" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FAFAF6" letter-spacing="3">PEERSCOPE</text>

  <!-- Community pill badge -->
  <g transform="translate(92, 116)">
    <rect width="148" height="32" rx="16" fill="#B8622A" opacity="0.25"/>
    <rect width="148" height="32" rx="16" fill="none" stroke="#F07C35" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="5" fill="#F07C35"/>
    <text x="32" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#F07C35" letter-spacing="1">FOR AGENCIES</text>
  </g>

  <!-- Headline -->
  <text x="92" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#FAFAF6" letter-spacing="-2">Your client's competitors</text>
  <text x="92" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#FAFAF6" letter-spacing="-2">moved.</text>
  <text x="92" y="386" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#94A3B8" letter-spacing="-1">Do you know</text>
  <text x="92" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#F07C35" letter-spacing="-1">about it yet?</text>

  <!-- Divider -->
  <rect x="92" y="472" width="64" height="3" rx="2" fill="#F07C35"/>

  <!-- Bottom tagline -->
  <text x="92" y="540" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="15" fill="#475569">peerscope.io</text>
  <text x="92" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#334155">Track your competitors. Not your budget.</text>

  <!-- Right panel: multi-client alert cards -->
  <g transform="translate(730, 100)" filter="url(#shadow)">
    <rect width="400" height="112" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="112" rx="2" fill="#F07C35"/>
    <rect x="20" y="22" width="36" height="36" rx="8" fill="#B8622A" opacity="0.25"/>
    <text x="31" y="47" font-family="system-ui, sans-serif" font-size="19">📊</text>
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#B8622A" letter-spacing="1">CLIENT: ACME CO · COMPETITOR ALERT</text>
    <text x="68" y="60" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">Rival relaunched pricing page</text>
    <text x="68" y="83" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">3 plan changes detected · 12 mins ago</text>
    <circle cx="378" cy="22" r="5" fill="#34D6B7"/>
  </g>

  <g transform="translate(762, 244)" filter="url(#shadow)">
    <rect width="368" height="112" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="112" rx="2" fill="#7C3AED"/>
    <rect x="20" y="22" width="36" height="36" rx="8" fill="#7C3AED" opacity="0.25"/>
    <text x="31" y="47" font-family="system-ui, sans-serif" font-size="19">🚀</text>
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#A78BFA" letter-spacing="1">CLIENT: ZETA INC · FEATURE LAUNCH</text>
    <text x="68" y="60" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">Competitor added AI assistant</text>
    <text x="68" y="83" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">New features page detected · 1h ago</text>
  </g>

  <g transform="translate(730, 388)" filter="url(#shadow)">
    <rect width="400" height="112" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="112" rx="2" fill="#1A7A6E"/>
    <rect x="20" y="22" width="36" height="36" rx="8" fill="#1A7A6E" opacity="0.25"/>
    <text x="31" y="47" font-family="system-ui, sans-serif" font-size="19">📋</text>
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#34D6B7" letter-spacing="1">CLIENT: NOVA · HIRING SIGNAL</text>
    <text x="68" y="60" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">Rival hiring 5 sales engineers</text>
    <text x="68" y="83" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">Job board scrape · 2h ago</text>
  </g>

  <!-- Bottom-right label -->
  <text x="1150" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#334155" text-anchor="end">competitive intelligence</text>
</svg>
