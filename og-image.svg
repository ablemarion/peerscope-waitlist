<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Subtle grid -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E293B" stroke-width="0.8"/>
    </pattern>
    <!-- Orange glow -->
    <radialGradient id="glow" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#B8622A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D0F1A" stop-opacity="0"/>
    </radialGradient>
    <!-- Card shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0F1A"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar (brand orange) -->
  <rect x="0" y="0" width="1200" height="4" fill="#F07C35"/>

  <!-- Left vertical accent line -->
  <rect x="72" y="60" width="3" height="480" fill="#B8622A" opacity="0.3"/>

  <!-- === LOGO / WORDMARK === -->
  <!-- Scope icon: circle + crosshair -->
  <g transform="translate(92, 64)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="#F07C35" stroke-width="2.5"/>
    <circle cx="16" cy="16" r="6" fill="#F07C35" opacity="0.9"/>
    <line x1="16" y1="2" x2="16" y2="8" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="16" y2="30" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="16" x2="8" y2="16" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="16" x2="30" y2="16" stroke="#F07C35" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="132" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FAFAF6" letter-spacing="3">PEERSCOPE</text>

  <!-- === MAIN HEADLINE (3 lines) === -->
  <text x="92" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#FAFAF6" letter-spacing="-2">Know what your</text>
  <text x="92" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#FAFAF6" letter-spacing="-2">competitors are</text>
  <text x="92" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#F07C35" letter-spacing="-2">doing first.</text>

  <!-- === SUPPORTING TEXT === -->
  <text x="92" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#94A3B8">SMB competitive intelligence. Waitlist now open.</text>

  <!-- === DIVIDER + CTA BADGE === -->
  <rect x="92" y="442" width="64" height="3" rx="2" fill="#F07C35"/>

  <!-- Waitlist badge -->
  <g transform="translate(92, 468)">
    <rect width="220" height="40" rx="20" fill="#B8622A" opacity="0.25"/>
    <rect width="220" height="40" rx="20" fill="none" stroke="#B8622A" stroke-width="1.5"/>
    <circle cx="22" cy="20" r="5" fill="#34D6B7"/>
    <text x="38" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#FAFAF6">Join the waitlist</text>
    <text x="156" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8">→</text>
  </g>

  <!-- Track your competitors. Not your budget. -->
  <text x="92" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#475569">peerscope.io · Track your competitors. Not your budget.</text>

  <!-- === RIGHT PANEL: ALERT CARDS === -->

  <!-- Card 1: Pricing change -->
  <g transform="translate(720, 88)" filter="url(#shadow)">
    <rect width="420" height="104" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <!-- Left accent: orange -->
    <rect x="0" y="0" width="4" height="104" rx="2" fill="#F07C35"/>
    <!-- Icon area -->
    <rect x="20" y="20" width="36" height="36" rx="8" fill="#B8622A" opacity="0.25"/>
    <text x="32" y="44" font-family="system-ui, sans-serif" font-size="18">💰</text>
    <!-- Text -->
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#B8622A" letter-spacing="1">PRICING CHANGE DETECTED</text>
    <text x="68" y="58" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">Acme raised their Pro plan</text>
    <text x="68" y="80" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">$79 → $99/mo · 3 minutes ago</text>
    <!-- Live dot -->
    <circle cx="396" cy="20" r="5" fill="#34D6B7"/>
    <circle cx="396" cy="20" r="5" fill="#34D6B7" opacity="0.4">
      <animate attributeName="r" from="5" to="10" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Card 2: Job posting (offset) -->
  <g transform="translate(752, 220)" filter="url(#shadow)">
    <rect width="388" height="104" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <!-- Left accent: teal -->
    <rect x="0" y="0" width="4" height="104" rx="2" fill="#1A7A6E"/>
    <!-- Icon area -->
    <rect x="20" y="20" width="36" height="36" rx="8" fill="#1A7A6E" opacity="0.25"/>
    <text x="32" y="44" font-family="system-ui, sans-serif" font-size="18">📋</text>
    <!-- Text -->
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D6B7" letter-spacing="1">NEW JOB POSTING</text>
    <text x="68" y="58" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">Rival.io hiring Sales Engineers</text>
    <text x="68" y="80" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">VP Sales + 4 AEs · 18 minutes ago</text>
  </g>

  <!-- Card 3: Feature launch (offset further) -->
  <g transform="translate(720, 352)" filter="url(#shadow)">
    <rect width="420" height="104" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <!-- Left accent: purple -->
    <rect x="0" y="0" width="4" height="104" rx="2" fill="#7C3AED"/>
    <!-- Icon area -->
    <rect x="20" y="20" width="36" height="36" rx="8" fill="#7C3AED" opacity="0.25"/>
    <text x="32" y="44" font-family="system-ui, sans-serif" font-size="18">🚀</text>
    <!-- Text -->
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#A78BFA" letter-spacing="1">FEATURE LAUNCH</text>
    <text x="68" y="58" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">Competitor added AI summaries</text>
    <text x="68" y="80" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">New /features page detected · 1h ago</text>
  </g>

  <!-- Card 4: Review spike (partial, bottom-right) -->
  <g transform="translate(752, 484)" filter="url(#shadow)">
    <rect width="388" height="104" rx="12" fill="#131829" stroke="#272D45" stroke-width="1"/>
    <!-- Left accent: amber -->
    <rect x="0" y="0" width="4" height="104" rx="2" fill="#D97706"/>
    <!-- Icon area -->
    <rect x="20" y="20" width="36" height="36" rx="8" fill="#D97706" opacity="0.25"/>
    <text x="32" y="44" font-family="system-ui, sans-serif" font-size="18">⭐</text>
    <!-- Text -->
    <text x="68" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FCD34D" letter-spacing="1">REVIEW SPIKE</text>
    <text x="68" y="58" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#FAFAF6">G2 rating dip detected</text>
    <text x="68" y="80" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">23 new 2-star reviews · 4h ago</text>
  </g>

</svg>
